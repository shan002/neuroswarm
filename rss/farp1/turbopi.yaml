# Units are MGS (Meters, Grams, Seconds) and radians unless otherwise specified
type: "MazeAgent"
sensors:
  - type: "BinaryFOVSensor"
    theta: 0.45  # Vision Angle / 2 (Radians)
    distance: 1.0  # meters. previously 2.55
    show: true
    # fn: 0.10  # 0.10
    # fp: 0.05  # 0.05
    # seed: 10
    bias: 0
    store_history: false
    target_team: blue
  - type: "BinaryFOVSensor"
    theta: 0.45  # Vision Angle / 2 (Radians)
    distance: 1.0  # meters. previously 2.55
    show: true
    # fn: 0.10  # 0.10
    # fp: 0.05  # 0.05
    # seed: 10
    bias: 0
    store_history: false
    target_team: red
team: blue
controller:
  type: "CaspianMultibitRemappedController"
  neuro_tpc: 10
  scale_forward_speed: 0.2  # m/s forward speed factor
  scale_turning_rates: 2.0  # rad/s turning rate factor
  sensor_id: 0
agent_radius: !np 0.2 / 2
stop_at_goal: false
# delay: 12
# idiosyncrasies:
#   mean:
#     - 0.9
#     - 0.9
#     - 0.95
#   sd:
#     - 0.1
#     - 0.1
#     - 0.06
body_color:
  - 0
  - 70
  - 255
body_filled: true
